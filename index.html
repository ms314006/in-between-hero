<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>In-Between Hero MVP</title>
  <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet">
  <style>
    @font-face {
      font-family: "Cubic 11";
      src: url("./assets/Cubic_11-BYAGXrlw.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --bg: #FAF6E9;
      --panel: #FFFDF6;
      --panel-2: #FAF6E9;
      --text: #3f4f2d;
      --muted: #718055;
      --line: #A0C878;
      --gold: #e7c65f;
      --red: #e56b6f;
      --green: #4f8f46;
      --blue: #6d9fb8;
      --purple: #b781b5;
      --village-light: #FFFDF6;
      --village-cream: #FAF6E9;
      --village-field: #DDEB9D;
      --village-leaf: #A0C878;
      --village-ink: #3f4f2d;
    }

    * { box-sizing: border-box; }

    html,
    body,
    pre,
    code,
    kbd,
    samp,
    button,
    input,
    select,
    textarea {
      font-family: "Cubic 11", system-ui, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 253, 246, 0.76), transparent 22rem),
        radial-gradient(circle at 88% 18%, rgba(221, 235, 157, 0.58), transparent 28rem),
        linear-gradient(145deg, #FFFDF6 0%, #FAF6E9 48%, #DDEB9D 100%);
      color: var(--text);
      font-size: 12px;
      line-height: 1.7;
    }

    button, select {
      font: inherit;
    }

    button:not(.nes-btn) {
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--text);
      background: #FFFDF6;
      transition: transform 0.08s ease, border-color 0.12s ease, background 0.12s ease;
    }

    button:not(.nes-btn):hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--gold);
      background: #FAF6E9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .brand h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0;
      letter-spacing: 0.04em;
      font-size: clamp(14px, 3vw, 21px);
      line-height: 0.95;
    }

    .sprite-actor {
      position: relative;
      display: inline-block;
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      overflow: hidden;
      image-rendering: pixelated;
      --hero-sprite-scale: 2.5;
      transform: scale(var(--hero-sprite-scale));
      transform-origin: center;
    }

    .sprite-actor::before {
      content: "";
      position: absolute;
      inset: 0;
      image-rendering: pixelated;
      background-image: var(--sprite-image, url("./assets/SwordsmanCyan-1yrhVlde.png"));
      background-position: var(--sprite-position, 0 -32px);
      background-repeat: no-repeat;
      background-size: auto;
    }

    .hero-title-sprite { cursor: pointer; }

    .sprite-actor.dying::before {
      animation: heroSpriteDeath 600ms ease-in both;
    }

    .sprite-actor.walking-in::before {
      animation: heroSpriteWalkIn 1000ms linear both;
    }

    .sprite-actor.defending::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(232, 63, 99, 0.65);
      -webkit-mask-image: var(--sprite-image, url("./assets/SwordsmanCyan-1yrhVlde.png"));
      mask-image: var(--sprite-image, url("./assets/SwordsmanCyan-1yrhVlde.png"));
      -webkit-mask-repeat: no-repeat;
      mask-repeat: no-repeat;
      -webkit-mask-position: var(--sprite-position, -16px -160px);
      mask-position: var(--sprite-position, -16px -160px);
      -webkit-mask-size: auto;
      mask-size: auto;
      pointer-events: none;
      animation: defendFlash 400ms linear 1;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 253, 246, 0.84);
      color: var(--muted);
    }

    .gold-icon,
    .gold-icon-svg {
      display: block;
      width: 32px;
      height: 32px;
    }

    .gold-icon-svg svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .gold-pill .gold {
      font-size: 18px;
    }

    .gold { color: #3f4f2d; font-weight: 800; }
    .danger { color: var(--red); }
    .success { color: var(--green); }
    .muted {
      color: var(--muted);
      margin-top: 10px;
    }

    .muted.danger {
      color: var(--red);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    .panel {
      grid-column: span 12;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 253, 246, 0.9);
      box-shadow: 0 18px 50px rgba(113, 128, 85, 0.22);
    }

    .panel.nes-container,
    .modal.nes-container,
    .card.nes-container,
    .shop-card.nes-container {
      border-radius: 0;
      background: rgba(255, 253, 246, 0.96);
      color: var(--text);
    }

    .nes-container.is-dark,
    .nes-container.is-dark.with-title > .title {
      color: var(--text);
      background-color: var(--village-light);
    }

    .nes-btn {
      margin: 0;
      white-space: normal;
      border-image-repeat: stretch !important;
    }

    .panel h2, .panel h3 {
      margin: 0 0 12px;
    }

    .battle-log-panel.nes-container.with-title {
      border-radius: 0;
      color: var(--text);
    }

    .battle-log-panel.nes-container.with-title > .title {
      margin-left: 0;
      color: var(--text);
      background: var(--village-light);
    }

    .section-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
    }

    .section-title-row h3 { margin: 0; }
    .section-title-row h2 { margin: 0; }

    .shop-gold-display {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 253, 246, 0.82);
      font-weight: 900;
      font-size: 18px;
    }

    .shop-gold-icon,
    .shop-gold-icon-svg {
      display: block;
      width: 32px;
      height: 32px;
    }

    .shop-gold-icon-svg svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .half { grid-column: span 6; }
    .third { grid-column: span 4; }
    .two-third { grid-column: span 8; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
    }

    .primary:not(.nes-btn) {
      border-color: #e7c65f;
      background: linear-gradient(180deg, #DDEB9D, #A0C878);
      font-weight: 800;
    }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: var(--panel-2);
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .card header {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: start;
    }

    .card strong { font-size: 17px; }
    .card p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.35; }

    #collectionList.card-list {
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    }

    #deckCollectionList.card-list {
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    }

    #handList.card-list {
      grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
    }

    #deckList.card-list {
      display: flex;
      gap: 10px;
      min-height: 156px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 10px;
      -webkit-overflow-scrolling: touch;
    }

    #deckList .compact-card {
      flex: 0 0 112px;
    }

    #deckMessage {
      margin-top: 10px;
    }

    #deckView .compact-card {
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    #handList .compact-card {
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .compact-card {
      --card-frame: var(--village-ink);
      position: relative;
      aspect-ratio: 5 / 7;
      min-height: 146px;
      padding: 8px;
      border: 3px solid var(--card-frame);
      background:
        linear-gradient(135deg, rgba(255, 253, 246, 0.94), rgba(250, 246, 233, 0.78)),
        var(--card-frame);
      box-shadow: 0 8px 18px rgba(58, 75, 48, 0.16), inset 0 0 0 2px rgba(255, 253, 246, 0.68);
      overflow: hidden;
    }

    .compact-card.Rare { --card-frame: var(--blue); }
    .compact-card.Epic { --card-frame: var(--purple); }
    .compact-card.Legendary { --card-frame: var(--gold); }

    .compact-card-inner {
      display: grid;
      grid-template-rows: 14% minmax(0, 1fr) 22%;
      gap: 5px;
      height: 100%;
      overflow: hidden;
    }

    .compact-card-title-block,
    .compact-card-text-block {
      border: 1px solid rgba(58, 75, 48, 0.22);
      border-radius: 3px;
      background: rgba(255, 253, 246, 0.7);
    }

    .compact-card-text-block {
      background: rgba(250, 246, 233, 0.82);
    }

    .compact-card-art {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(58, 75, 48, 0.24);
      border-radius: 4px;
      background: rgba(255, 253, 246, 0.42);
      overflow: hidden;
    }

    .compact-card-icon {
      display: block;
      position: relative;
      width: clamp(56px, 68%, 96px) !important;
      aspect-ratio: 1;
      height: auto !important;
      filter: drop-shadow(0 6px 0 rgba(58, 75, 48, 0.14));
    }

    .compact-card-icon svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .compact-card-count {
      position: absolute;
      right: 6px;
      bottom: 6px;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.56);
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .collection-card {
      --card-frame: var(--village-ink);
      position: relative;
      aspect-ratio: 5 / 7;
      min-height: 280px;
      padding: 8px;
      border: 3px solid var(--card-frame);
      background:
        linear-gradient(135deg, rgba(255, 253, 246, 0.95), rgba(250, 246, 233, 0.84)),
        var(--card-frame);
      box-shadow: 0 10px 22px rgba(58, 75, 48, 0.18), inset 0 0 0 2px rgba(255, 253, 246, 0.76);
      color: var(--text);
      overflow: hidden;
    }

    .collection-card.Rare { --card-frame: var(--blue); }
    .collection-card.Epic { --card-frame: var(--purple); }
    .collection-card.Legendary { --card-frame: var(--gold); }

    .collection-card-inner {
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr) 94px;
      gap: 7px;
      height: 100%;
      overflow: hidden;
    }

    .collection-card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(58, 75, 48, 0.28);
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(255, 253, 246, 0.96), rgba(250, 246, 233, 0.9));
      min-height: 0;
      overflow: hidden;
    }

    .collection-card strong {
      font-size: 17px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .collection-card-cost {
      flex: 0 0 auto;
      padding: 4px 7px;
      border: 1px solid currentColor;
      border-radius: 999px;
      color: var(--card-frame);
      font-size: 12px;
      font-weight: 800;
      background: rgba(255, 253, 246, 0.84);
    }

    .collection-card-art {
      display: grid;
      place-items: center;
      min-height: 0;
      border: 2px solid rgba(58, 75, 48, 0.32);
      border-radius: 4px;
      box-shadow: inset 0 0 0 3px rgba(255, 253, 246, 0.42);
      overflow: hidden;
    }

    .collection-card-icon {
      display: block;
      position: relative;
      width: clamp(72px, 42%, 160px) !important;
      aspect-ratio: 1;
      height: auto !important;
      filter: drop-shadow(0 8px 0 rgba(58, 75, 48, 0.14));
    }

    .collection-card-icon svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .collection-card-text {
      min-height: 0;
      padding: 8px 9px 24px;
      border: 1px solid rgba(58, 75, 48, 0.28);
      border-radius: 4px;
      background: rgba(250, 246, 233, 0.92);
      overflow: hidden;
    }

    .collection-card-text .rarity { display: inline-block; margin-bottom: 5px; }
    .collection-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .collection-card-count {
      position: absolute;
      right: 8px;
      bottom: 7px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.56);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      text-align: center;
    }

    .modal.card-detail-modal {
      width: fit-content;
      max-width: 92vw;
    }

    .card-detail-content {
      display: grid;
      place-items: center;
    }

    .card-detail-content .collection-card {
      width: min(320px, 78vw);
      min-height: 448px;
    }

    .rarity {
      font-size: 12px;
      border-radius: 999px;
      padding: 3px 8px;
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    .Common { color: var(--village-ink); }
    .Rare { color: var(--blue); }
    .Epic { color: var(--purple); }
    .Legendary { color: var(--gold); }

    .battle-cards {
      position: relative;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 18px;
      min-height: 300px;
      margin: 14px 0;
      padding: 18px;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 78% 24%, rgba(255, 253, 246, 0.48), transparent 7rem),
        radial-gradient(ellipse at 22% 78%, rgba(221, 235, 157, 0.5), transparent 8rem),
        linear-gradient(180deg, rgba(221, 235, 157, 0.5), rgba(160, 200, 120, 0.64));
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .battle-side {
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 120px;
      min-width: 0;
    }

    .enemy-side {
      justify-content: flex-end;
      align-items: center;
    }

    .player-side {
      justify-content: flex-start;
      align-items: flex-end;
      gap: 52px;
    }

    .player-side .battle-sprite {
      margin-right: 0;
      z-index: 2;
    }

    .player-thought-chain {
      display: flex;
      align-items: flex-end;
      gap: 0px;
      min-width: 0;
    }

    .player-thought-chain .player-thought-step + .player-thought-step {
      margin-left: -7px;
    }

    .battle-sprite {
      margin: clamp(18px, 4vw, 32px);
      z-index: 1;
    }

    #enemyBattleSprite { --hero-sprite-scale: 7; }
    #playerBattleSprite { --hero-sprite-scale: 10; }

    .enemy-number-cluster {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .player-thought {
      position: relative;
      min-width: 0;
      width: clamp(118px, 28vw, 190px);
      padding: 6px;
    }

    .player-thought-step {
      flex: 0 0 auto;
      border: 4px solid #fff;
      background: var(--village-light);
      position: relative;
      z-index: 1;
    }

    .player-thought-step.small {
      width: 14px;
      height: 14px;
      margin-right: 16px;
    }

    .player-thought-step.large {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
    }

    .number-card {
      width: clamp(96px, 22vw, 130px);
      min-width: 0;
      min-height: 108px;
      box-sizing: border-box;
      padding: 1rem 0.75rem;
      display: grid;
      place-items: center;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .number-card .number-card-content {
      width: 100%;
      display: grid;
      place-items: center;
    }

    .number-card.targetable {
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(160, 200, 120, 0.24), 0 0 28px rgba(160, 200, 120, 0.24);
    }

    .number-card.targetable:hover {
      transform: translateY(-4px) scale(1.02);
    }

    .number-card.player-success {
      border-color: var(--green) !important;
    }

    .number-card.player-fail {
      border-color: var(--red) !important;
    }

    .player-thought-chain:has(.number-card.player-success) {
      animation: numberWinNudge 0.42s ease both;
    }

    .player-thought-chain:has(.number-card.player-fail) {
      animation: numberFailShake 0.32s ease both;
    }

    .battle-panel.entering {
      animation: none;
      background: rgba(255, 253, 246, 0.94) !important;
      color: var(--text) !important;
    }

    .number-card.nes-container,
    .number-card.nes-container.with-title > .title {
      background-color: var(--village-light);
      color: var(--text);
    }

    .number-card .num {
      font-size: clamp(24px, 6vw, 48px);
      font-weight: 900;
      width: 100%;
      text-align: center;
      line-height: 1;
      margin-top: 4px;
      overflow: hidden;
      white-space: nowrap;
    }

    .number-card > .title {
      color: var(--muted);
    }

    .log {
      max-height: 220px;
      overflow-x: hidden;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 4px 10px;
      background: rgba(250, 246, 233, 0.62);
      color: var(--muted);
      line-height: 1.45;
    }

    .deck-summary-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .deck-summary-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0px 10px;
      background: rgba(250, 246, 233, 0.58);
    }

    .deck-summary-item strong {
      color: currentColor;
    }

    .deck-summary-count {
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
    }

    .result-box {
      font-size: 18px;
      line-height: 1.7;
    }

    .target-banner {
      margin-top: 12px;
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(221, 235, 157, 0.26);
      color: var(--gold);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.68);
    }

    .modal {
      width: min(680px, 100%);
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      background: linear-gradient(160deg, #FFFDF6, #FAF6E9);
      box-shadow: 0 24px 80px rgba(113, 128, 85, 0.42);
    }

    .chests {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .chest {
      min-height: 120px;
      font-size: 44px;
      border-color: #e7c65f;
      background: linear-gradient(180deg, #DDEB9D, #A0C878);
    }

    .shop-items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
      justify-content: center;
      margin: 14px 0;
    }

    #shopModal.modal-backdrop {
      overflow-y: auto;
    }

    #shopModal .modal {
      overflow: visible;
      max-height: none;
    }

    @media (min-width: 860px) {
      .shop-items {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .shop-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .shop-card.sold::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: 4px;
      background: rgba(80, 80, 80, 0.52);
      pointer-events: none;
    }

    .shop-card.sold button {
      position: relative;
      z-index: 3;
